<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WV Asset Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#FAF7F2;--surface:#FFFFFF;--surface-2:#F4EFE7;
--line:#ECE5D8;--line-2:#DDD2BC;
--ink:#1F1B16;--ink-2:#4A423B;--ink-3:#847A6D;
--o-50:#FFF1EB;--o-100:#FFDBC7;--o-500:#EB5424;--o-600:#C73E18;--o-700:#8F2A0E;
--ok:#1E7F4E;--warn:#B97400;--bad:#B83A12;--info:#2563A8;
--sidebar-w:240px;--topbar-h:56px;
}
html{font-size:14px}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--line)}
.sidebar-brand h1{font-size:15px;font-weight:700;color:var(--o-600);line-height:1.2}
.sidebar-brand small{font-size:11px;color:var(--ink-3);display:block;margin-top:2px}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--ink-2);font-size:13px;font-weight:500;text-decoration:none;transition:all .15s}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.active{background:var(--o-50);color:var(--o-600)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.feed-strip{padding:12px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-3)}
.feed-strip .feed-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.feed-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.feed-dot.ok{background:var(--ok)}.feed-dot.stale{background:var(--warn)}.feed-dot.none{background:var(--line-2)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
.topbar-search{flex:1;max-width:400px;position:relative}
.topbar-search input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);font-size:13px;outline:none;font-family:inherit}
.topbar-search input:focus{border-color:var(--o-500);background:var(--surface)}
.topbar-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-3)}
.topbar-search kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--ink-3);background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-family:'IBM Plex Mono',monospace}
.content{flex:1;padding:24px;max-width:1400px;width:100%}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.kpi-tile{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:20px;cursor:pointer;transition:all .15s}
.kpi-tile:hover{border-color:var(--o-500);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.kpi-tile .kpi-label{font-size:12px;color:var(--ink-3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.kpi-tile .kpi-value{font-size:32px;font-weight:700;margin-top:4px}
.kpi-tile .kpi-sub{font-size:11px;color:var(--ink-3);margin-top:2px}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-in_use,.pill-inuse{background:#E8F5EE;color:#115E36}
.pill-in_store,.pill-instore{background:#EEF1F8;color:#1F4A8C}
.pill-verify{background:#FFF6E0;color:#7C5300}
.pill-broken{background:#FCE9E2;color:#8F2A0E}
.pill-retired{background:#EFEBE5;color:#58504A}
.pill-compliant{background:#E8F5EE;color:#115E36}
.pill-noncompliant{background:#FCE9E2;color:#8F2A0E}
.pill-ingraceperiod{background:#FFF6E0;color:#7C5300}
.signal{display:inline-flex;gap:3px;align-items:center}
.signal .dot{width:8px;height:8px;border-radius:50%}
.signal .dot.on{background:var(--ok)}.signal .dot.off{background:var(--line-2)}
.signal .dot-label{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--ink-3);margin-right:1px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--line);font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap}
.data-table th:hover{color:var(--ink)}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.data-table tr:hover{background:var(--surface-2)}
.data-table tr{cursor:pointer}
.storage-bar{width:100px;height:6px;background:var(--line);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.storage-bar .fill{height:100%;border-radius:3px}
.storage-bar .fill.green{background:var(--ok)}.storage-bar .fill.yellow{background:var(--warn)}.storage-bar .fill.red{background:var(--bad)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--o-100);color:var(--o-700);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.avatar.lg{width:48px;height:48px;font-size:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:20px}
.card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--ink)}
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);transition:all .15s}
.chip:hover{border-color:var(--o-500)}
.chip.active{background:var(--o-500);color:#fff;border-color:var(--o-500)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--o-500);color:#fff}.btn-primary:hover{background:var(--o-600)}
.btn-secondary{background:var(--surface);border:1px solid var(--line);color:var(--ink-2)}.btn-secondary:hover{border-color:var(--o-500)}
.btn-danger{background:var(--bad);color:#fff}.btn-danger:hover{background:#9A2F0F}
.info-tip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-3);font-size:10px;font-weight:700;cursor:help;margin-left:4px;vertical-align:middle;flex-shrink:0}
.info-tip:hover{background:var(--o-50);border-color:var(--o-500);color:var(--o-600)}
.info-tip .info-bubble{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);width:280px;padding:12px 14px;background:var(--ink);color:#fff;border-radius:10px;font-size:12px;font-weight:400;line-height:1.5;z-index:9999;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25);text-transform:none;letter-spacing:0}
.info-tip .info-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--ink)}
.info-tip:hover .info-bubble{display:block}
.btn-sm{padding:5px 10px;font-size:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h2{font-size:18px;margin-bottom:16px}
.modal label{display:block;font-size:12px;font-weight:600;color:var(--ink-3);margin-bottom:4px;margin-top:12px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--o-500)}
.modal textarea{min-height:80px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,.1);font-size:13px;display:flex;align-items:center;gap:8px;animation:slideIn .3s ease;max-width:360px}
.toast.success{border-left:3px solid var(--ok)}.toast.error{border-left:3px solid var(--bad)}.toast.info{border-left:3px solid var(--info)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.dash-grid .full{grid-column:1/-1}
.issue-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.issue-item:last-child{border-bottom:none}
.issue-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.issue-dot.warn{background:var(--warn)}.issue-dot.bad{background:var(--bad)}.issue-dot.info{background:var(--info)}
.venn-svg{width:100%;max-width:350px;margin:0 auto;display:block}
.detail-header{display:flex;gap:20px;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap}
.detail-header .info{flex:1;min-width:300px}
.detail-header h2{font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.detail-header .meta{font-size:12px;color:var(--ink-3);margin-top:4px;font-family:'IBM Plex Mono',monospace}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:20px}
.tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--o-600);border-bottom-color:var(--o-600)}
.spec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.spec-item{padding:12px;background:var(--surface-2);border-radius:8px}
.spec-item .spec-label{font-size:11px;color:var(--ink-3);font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.spec-item .spec-value{font-size:14px;font-weight:500;margin-top:2px}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.person-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;display:flex;gap:12px;align-items:center}
.person-card:hover{border-color:var(--o-500);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.person-card .person-info{flex:1}
.person-card .person-name{font-weight:600;font-size:14px}
.person-card .person-team{font-size:12px;color:var(--ink-3)}
.person-card .person-devices{font-size:11px;color:var(--ink-3);margin-top:4px}
.device-chip{display:inline-block;background:var(--surface-2);border-radius:4px;padding:2px 6px;font-size:11px;font-family:'IBM Plex Mono',monospace;margin:2px 2px 0 0}
.sync-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px}
.sync-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:20px}
.sync-card h4{font-size:15px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sync-card .sync-stat{font-size:12px;color:var(--ink-3);margin-top:4px}
.drop-zone{border:2px dashed var(--line-2);border-radius:12px;padding:48px;text-align:center;color:var(--ink-3);cursor:pointer;transition:all .15s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--o-500);background:var(--o-50)}
.drop-zone h3{font-size:16px;color:var(--ink-2);margin-bottom:8px}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:12px}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.bar-label{width:160px;text-align:right;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:18px;background:var(--surface-2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--o-500);border-radius:4px;transition:width .3s}
.bar-count{width:30px;font-size:11px;color:var(--ink-3);font-family:'IBM Plex Mono',monospace}
.audit-kind{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.audit-kind.retire{background:#EFEBE5;color:#58504A}
.audit-kind.assign{background:#E8F5EE;color:#115E36}
.audit-kind.transfer{background:#EEF1F8;color:#1F4A8C}
.audit-kind.note{background:#FFF6E0;color:#7C5300}
.audit-kind.sync{background:var(--o-50);color:var(--o-700)}
.audit-kind.tag{background:#EEF1F8;color:#1F4A8C}
.audit-kind.edit{background:var(--surface-2);color:var(--ink-2)}
.page-title{font-size:22px;font-weight:700;margin-bottom:20px}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.toolbar .spacer{flex:1}
.search-input{padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;outline:none;min-width:200px}
.search-input:focus{border-color:var(--o-500)}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-3)}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--ink-2)}
.breadcrumb{font-size:12px;color:var(--ink-3);margin-bottom:12px}
.breadcrumb a{color:var(--o-500);text-decoration:none;cursor:pointer}
.breadcrumb a:hover{text-decoration:underline}
.wizard-steps{display:flex;gap:0;margin-bottom:24px}
.wizard-step{flex:1;text-align:center;padding:12px;font-size:13px;font-weight:500;color:var(--ink-3);border-bottom:3px solid var(--line);position:relative}
.wizard-step.active{color:var(--o-600);border-bottom-color:var(--o-500)}
.wizard-step.done{color:var(--ok);border-bottom-color:var(--ok)}
.diff-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
.diff-table th{background:var(--surface-2);padding:6px 8px;text-align:left;font-size:11px}
.diff-table td{padding:6px 8px;border-bottom:1px solid var(--line)}
.diff-add{background:#E8F5EE}.diff-update{background:#FFF6E0}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.dash-grid{grid-template-columns:1fr}.sync-grid{grid-template-columns:1fr}}
@media(max-width:700px){.sidebar{display:none}.main{margin-left:0}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
</style>
</head>

// Normalize: PS5.1 ConvertTo-Json may use different key casing
function normalizeDevice(d) {
  return {
    tag: d.tag || d.Tag || '',
    serial: d.serial || d.Serial || '',
    name: d.name || d.Name || null,
    make: d.make || d.Make || 'Unknown',
    model: d.model || d.Model || 'Unknown',
    cpu: d.cpu || d.Cpu || '',
    ram: d.ram || d.Ram || 0,
    totalGB: d.totalGB || d.TotalGB || 0,
    freeGB: d.freeGB || d.FreeGB || 0,
    os: d.os || d.Os || '',
    osVersion: d.osVersion || d.OsVersion || '',
    purchaseDate: d.purchaseDate || d.PurchaseDate || '',
    warrantyEnd: d.warrantyEnd || d.WarrantyEnd || '',
    ip: d.ip || d.Ip || '',
    site: d.site || d.Site || 'Main',
    compliance: d.compliance || d.Compliance || '',
    encrypted: d.encrypted || d.Encrypted || false,
    userId: d.userId || d.UserId || null,
    notes: d.notes || d.Notes || '',
    feeds: normalizeFeeds(d.feeds || d.Feeds || {}),
    manualStatus: d.manualStatus || d.ManualStatus || null,
    retiredReason: d.retiredReason || d.RetiredReason || null,
    retiredAt: d.retiredAt || d.RetiredAt || null,
    historical: d.historical || d.Historical || false,
    history: d.history || d.History || []
  };
}
function normalizeFeeds(f) {
  const r = {};
  for (const k of ['intune','rmm','cyber','Intune','Rmm','Cyber']) {
    if (f[k]) {
      const key = k.toLowerCase();
      const val = f[k];
      r[key] = { lastSeen: val.lastSeen || val.LastSeen || val };
    }
  }
  return r;
}
function normalizeUser(u) {
  return {
    id: u.id || u.Id || '',
    name: u.name || u.Name || '',
    email: u.email || u.Email || '',
    team: u.team || u.Team || 'World Vision UK',
    initials: u.initials || u.Initials || '??'
  };
}

const LS_KEY = 'wv_asset_console';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.devices && s.devices.length > 0) { ensureDeviceIds(s.devices); return s; }
    }
  } catch(e) {}
  var result = {
    devices: SEED_DEVICES.map(normalizeDevice),
    users: SEED_USERS.map(normalizeUser),
    audit: [],
    feedMeta: {
      intune: { lastImport: '2026-05-23', count: 220 },
      rmm: { lastImport: '2026-05-23', count: 163 },
      cyber: { lastImport: '2026-05-21', count: 153 }
    }
  };
  ensureDeviceIds(result.devices);
  return result;
}
function ensureDeviceIds(devices) {
  var usedTags = {};
  devices.forEach(function(d){ if(d.tag) usedTags[d.tag] = true; });
  var autoId = 1;
  devices.forEach(function(d){
    if(!d.tag) {
      while(usedTags['D'+String(autoId).padStart(3,'0')]) autoId++;
      d.tag = 'D'+String(autoId).padStart(3,'0');
      usedTags[d.tag] = true;
      autoId++;
    }
  });
}

function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) { toast('Storage full!','error'); }
}

// === STATUS DERIVATION ===
function daysSince(iso) {
  if (!iso) return 9999;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}

function deriveStatus(d) {
  if (d.manualStatus) return { status: d.manualStatus, confidence: d.retiredReason || '' };
  const has = k => d.feeds && d.feeds[k] != null;
  const days = k => has(k) ? daysSince(d.feeds[k].lastSeen) : null;
  if (has('intune') && has('rmm') && has('cyber')) return { status:'In Use', confidence:'verified · all 3 feeds' };
  if (has('intune') && has('cyber') && !has('rmm')) return { status:'In Use', confidence:'95% · cybersmart active, RMM missing' };
  if (has('intune') && has('rmm') && !has('cyber')) {
    if (days('rmm') >= 90) return { status:'In Store', confidence:'80% · RMM cold, not in cybersmart' };
    return { status:'Verify', confidence:'RMM warm but no cybersmart — check' };
  }
  if (has('intune') && !has('rmm') && !has('cyber')) {
    if (days('intune') > 365) return { status:'Retired', confidence:'intune-only · last seen >1y' };
    return { status:'In Store', confidence:'intune-only · no agents' };
  }
  if (has('rmm') && !has('intune')) return { status:'Verify', confidence:'orphan · in RMM, not in Intune' };
  return { status:'Verify', confidence:'no feed coverage' };
}

function statusKey(s) { return s.toLowerCase().replace(/\s+/g, '_'); }

// === ROUTING ===
function getRoute() {
  const h = location.hash.slice(1) || '/';
  const parts = h.split('?')[0].split('/').filter(Boolean);
  return { path: parts, full: h };
}
function navigate(hash) { location.hash = hash; }
window.addEventListener('hashchange', render);

// === RENDER ===
function render() {
  // Remember focused input so search/text fields don't lose focus on re-render
  var focused = document.activeElement;
  var focusInfo = null;
  if (focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA')) {
    focusInfo = {
      id: focused.id || null,
      cls: focused.className || null,
      placeholder: focused.placeholder || null,
      selStart: focused.selectionStart,
      selEnd: focused.selectionEnd
    };
  }
  const r = getRoute();
  const app = document.getElementById('app');
  updateNav(r);
  updateFeedStrip();
  if (r.path[0] === 'devices' && r.path[1]) renderDeviceDetail(app, decodeURIComponent(r.path[1]));
  else if (r.path[0] === 'devices') renderDevices(app);
  else if (r.path[0] === 'people' && r.path[1]) renderPersonDetail(app, decodeURIComponent(r.path[1]));
  else if (r.path[0] === 'people') renderPeople(app);
  else if (r.path[0] === 'sync') renderSync(app);
  else if (r.path[0] === 'import') renderImport(app);
  else if (r.path[0] === 'audit') renderAudit(app);
  else if (r.path[0] === 'settings') renderSettings(app);
  else renderDashboard(app);
  // Keep global search box in sync with deviceSearch
  var gs = document.getElementById('globalSearch');
  if (gs && document.activeElement !== gs && gs.value !== deviceSearch) gs.value = deviceSearch;
  // Restore focus to the same input after re-render
  if (focusInfo) {
    var el = null;
    if (focusInfo.id) el = document.getElementById(focusInfo.id);
    if (!el && focusInfo.placeholder) {
      var inputs = document.querySelectorAll('input, textarea');
      for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].placeholder === focusInfo.placeholder) { el = inputs[i]; break; }
      }
    }
    if (el) {
      el.focus();
      try { el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd); } catch(e) {}
    }
  }
}

function updateNav(r) {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = NAV_ITEMS.map(n => {
    const active = (r.full === '/' && n.hash === '#/') || (r.full !== '/' && n.hash !== '#/' && ('#/' + r.path[0]) === n.hash);
    return '<a class="nav-item '+(active?'active':'')+'" href="'+n.hash+'">'+n.icon+'<span>'+n.label+'</span></a>';
  }).join('');
}

function updateFeedStrip() {
  const el = document.getElementById('feedStrip');
  const fm = state.feedMeta || {};
  const feeds = ['intune','rmm','cyber'];
  el.innerHTML = '<div style="font-weight:600;margin-bottom:4px">Feed Status</div>' +
    feeds.map(function(f) {
      const m = fm[f];
      const cls = m ? (daysSince(m.lastImport+'T00:00:00') > 30 ? 'stale' : 'ok') : 'none';
      return '<div class="feed-row"><span class="feed-dot '+cls+'"></span><span>'+f.charAt(0).toUpperCase()+f.slice(1)+'</span><span style="margin-left:auto">'+(m ? m.lastImport : 'never')+'</span></div>';
    }).join('');
}

function osDisplay(d) {
  if (!d.os) return '--';
  var os = d.os;
  if (d.osVersion) {
    var v = d.osVersion;
    if (os === 'Windows' && v.startsWith('10.0.2')) {
      var build = parseInt(v.split('.')[2]) || 0;
      if (build >= 26100) os = 'Windows 11';
      else if (build >= 22000) os = 'Windows 11';
      else os = 'Windows 10';
      os += ' (' + v + ')';
    } else if (v && v !== os) {
      os += ' ' + v;
    }
  }
  return os;
}
function storageHtml(d) {
  if (!d.totalGB) return '<span class="mono" style="font-size:11px;color:var(--ink-3)">--</span>';
  const used = d.totalGB - d.freeGB;
  const pct = Math.round((used / d.totalGB) * 100);
  const cls = pct > 85 ? 'red' : pct > 70 ? 'yellow' : 'green';
  return '<span class="storage-bar"><span class="fill '+cls+'" style="width:'+pct+'%"></span></span> <span class="mono" style="font-size:11px;color:var(--ink-3)">'+Math.round(used)+'/'+Math.round(d.totalGB)+' GB</span>';
}

function lastSeenDate(d) {
  const dates = [];
  if (d.feeds) {
    ['intune','rmm','cyber'].forEach(function(k) {
      if (d.feeds[k] && d.feeds[k].lastSeen) { var dt = new Date(d.feeds[k].lastSeen); if (!isNaN(dt.getTime())) dates.push(dt); }
    });
  }
  if (!dates.length) return null;
  return new Date(Math.max.apply(null, dates));
}
function formatDate(d) {
  if (!d) return '--';
  if (typeof d === 'string') d = new Date(d);
  if (isNaN(d)) return '--';

    else if (deviceFilter === 'historical') devs = state.devices.filter(function(d) { return d.historical; });
    else devs = devs.filter(function(d) { return statusKey(deriveStatus(d).status) === deviceFilter; });
  }
  if (deviceSearch) {
    var q = deviceSearch.toLowerCase();

      var u = getUserById(d.userId);
      return (d.tag+'').includes(q) || (d.name||'').toLowerCase().includes(q) || d.serial.toLowerCase().includes(q) || (u?u.name:'').toLowerCase().includes(q);
    });

  devs.sort(function(a,b) {

      case 'user': va=(getUserById(a.userId)||{name:''}).name.toLowerCase(); vb=(getUserById(b.userId)||{name:''}).name.toLowerCase(); break;

    devs.map(function(d) {

function sortDevices(col) {
  if (deviceSort.col === col) deviceSort.asc = !deviceSort.asc;
  else { deviceSort.col = col; deviceSort.asc = true; }
  render();
}

function exportCSV() {
  var devs = state.devices.filter(function(d){return !d.historical;});
  var csv = 'Tag,Serial,Name,Make,Model,Status,User,OS,IP,Site,Compliance\n';
  devs.forEach(function(d) {
    var st = deriveStatus(d).status;
    var u = getUserById(d.userId);
    csv += [d.tag,d.serial,d.name||'',d.make,d.model,st,u?u.name:'',d.os,d.ip,d.site,d.compliance].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',')+'\n';
  });
  var blob = new Blob([csv],{type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wv_devices_export.csv';
  a.click();
  toast('CSV exported');
}
function exportHTML() {
  // Generate a fresh self-contained HTML with current devices + users baked in as SEED data.
  // This lets you upload it as index.html to GitHub and everyone sees the updated data.
  var html = document.documentElement.outerHTML;
  var newDevicesJson = JSON.stringify(state.devices);
  var newUsersJson = JSON.stringify(state.users);
  // Replace the SEED_DEVICES = [...]; line
  html = html.replace(/const\s+SEED_DEVICES\s*=\s*\[[\s\S]*?\];/, 'const SEED_DEVICES = ' + newDevicesJson + ';');
  html = html.replace(/const\s+SEED_USERS\s*=\s*\[[\s\S]*?\];/, 'const SEED_USERS = ' + newUsersJson + ';');
  // Add doctype back (outerHTML doesn't include it)
  html = '<!DOCTYPE html>\n' + html;
  var blob = new Blob([html], {type: 'text/html'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  toast('HTML exported as index.html — upload to GitHub to publish');
}

    var reassigns = historyEntries.filter(function(h){return h.type === 'reassign';});
    var allChanges = historyEntries.slice().sort(function(a,b){return new Date(b.ts) - new Date(a.ts);});

    var prevOwnersHtml = '';
    if (reassigns.length > 0) {
      var ownerTimeline = reassigns.map(function(r){
        var parts = r.detail.match(/from (.+?) to (.+)$/);
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)">'+
          '<span style="font-size:12px;color:var(--ink-3);white-space:nowrap" class="mono">'+formatDate(r.ts)+'</span>'+
          '<span style="background:var(--surface-2);padding:4px 10px;border-radius:4px;font-size:13px">'+(parts?esc(parts[1]):'--')+'</span>'+
          '<span style="color:var(--ink-3);font-size:16px">&rarr;</span>'+
          '<span style="background:var(--o-50);padding:4px 10px;border-radius:4px;font-size:13px;font-weight:500">'+(parts?esc(parts[2]):'--')+'</span>'+
        '</div>';
      }).join('');
      prevOwnersHtml = '<div class="card" style="margin-bottom:16px"><h3>Previous Owners</h3>'+ownerTimeline+'</div>';
    }

    var changesHtml = '';
    if (allChanges.length > 0) {
      changesHtml = '<div class="card" style="margin-bottom:16px"><h3>Device Changes</h3>'+
        '<table class="data-table"><thead><tr><th>Time</th><th>Type</th><th>Detail</th></tr></thead><tbody>'+
        allChanges.map(function(h){
          var typeClass = h.type === 'reassign' ? 'assign' : h.type === 'compliance' ? 'edit' : h.type === 'feed' ? 'sync' : h.type === 'status' ? 'tag' : h.type === 'note' ? 'note' : 'sync';
          return '<tr><td class="mono" style="font-size:12px;white-space:nowrap">'+formatDate(h.ts)+'</td><td><span class="audit-kind '+typeClass+'">'+esc(h.type)+'</span></td><td>'+esc(h.detail)+'</td></tr>';
        }).join('')+'</tbody></table></div>';
    }

    var auditHtml = '';
    if (audits.length > 0) {
      auditHtml = '<div class="card"><h3>Audit Log Entries</h3>'+
        '<table class="data-table"><thead><tr><th>Time</th><th>Kind</th><th>Message</th><th>Actor</th></tr></thead><tbody>'+
        audits.map(function(a){return '<tr><td class="mono" style="font-size:12px;white-space:nowrap">'+formatDate(a.ts)+'</td><td><span class="audit-kind '+a.kind+'">'+a.kind+'</span></td><td>'+esc(a.msg)+'</td><td>'+esc(a.actor)+'</td></tr>';}).join('')+'</tbody></table></div>';
    }

    if (!prevOwnersHtml && !changesHtml && !auditHtml) {
      tc.innerHTML = '<div style="color:var(--ink-3);font-size:13px;padding:20px">No history entries for this device</div>';
    } else {
      tc.innerHTML = prevOwnersHtml + changesHtml + auditHtml;
    }
  }
}

// === MODALS ===
function showReassign(tag) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  var opts = state.users.map(function(u){return '<option value="'+esc(u.id)+'" '+(d.userId===u.id?'selected':'')+'>'+esc(u.name)+'</option>';}).join('');
  showModal('<h2>Reassign Device '+esc(tag)+'</h2><label>Assign to</label><select id="mReassignUser"><option value="">-- Unassign --</option>'+opts+'</select><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doReassign(\''+tag+'\')">Save</button></div>');
}
function doReassign(tag) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  var prev = getUserById(d.userId);
  var newId = document.getElementById('mReassignUser').value || null;
  var newU = getUserById(newId);
  d.userId = newId;
  if (!newId) addAudit('transfer','Unassigned '+tag+' (was '+(prev?prev.name:'nobody')+')');
  else if (prev) addAudit('transfer','Reassigned '+tag+' from '+prev.name+' → '+newU.name);
  else addAudit('assign','Assigned '+tag+' to '+newU.name);
  saveState(); closeModal(); render(); toast('Device reassigned');
}
function showRetire(tag) {
  showModal('<h2>Retire Device '+esc(tag)+'</h2><label>Reason (required)</label><textarea id="mRetireReason" placeholder="Why is this device being retired?"></textarea><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doRetire(\''+tag+'\')">Retire</button></div>');
}
function doRetire(tag) {
  var reason = document.getElementById('mRetireReason').value.trim();
  if (!reason) { toast('Reason is required','error'); return; }
  var d = state.devices.find(function(x){return x.tag===tag;});
  d.manualStatus = 'Retired';
  d.retiredReason = reason;
  d.retiredAt = new Date().toISOString();
  addAudit('retire',tag+' marked Retired — '+reason);
  saveState(); closeModal(); render(); toast('Device retired');
}
function showEditDevice(tag) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  showModal('<h2>Edit Device '+esc(tag)+'</h2><label>Asset Tag</label><input id="mTag" value="'+esc(d.tag)+'"/><label>Serial Number</label><input id="mSerial" value="'+esc(d.serial)+'"/><label>Hostname</label><input id="mName" value="'+esc(d.name||'')+'"/><label>Make</label><input id="mMake" value="'+esc(d.make)+'"/><label>Model</label><input id="mModel" value="'+esc(d.model)+'"/><label>Site</label><input id="mSite" value="'+esc(d.site)+'"/><label>Notes</label><textarea id="mNotes">'+esc(d.notes)+'</textarea><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doEditDevice(\''+tag+'\')">Save</button></div>');
}
function doEditDevice(tag) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  var changes = [];
  if(!d.history) d.history = [];
  var tg = document.getElementById('mTag').value.trim();
  var sr = document.getElementById('mSerial').value.trim();
  var nm = document.getElementById('mName').value.trim();
  var mk = document.getElementById('mMake').value.trim();
  var ml = document.getElementById('mModel').value.trim();
  var st = document.getElementById('mSite').value.trim();
  var nt = document.getElementById('mNotes').value.trim();
  if (tg !== d.tag) { changes.push('asset tag: '+d.tag+' → '+tg); d.history.push({ts:new Date().toISOString(),type:'note',detail:'Asset tag changed from '+d.tag+' to '+tg}); d.tag = tg; }
  if (sr !== d.serial) { changes.push('serial'); d.serial = sr; }
  if (nm !== (d.name||'')) { changes.push('hostname'); d.name = nm || null; }
  if (mk !== d.make) { changes.push('make'); d.make = mk; }
  if (ml !== d.model) { changes.push('model'); d.model = ml; }
  if (st !== d.site) { changes.push('site'); d.site = st; }
  if (nt !== d.notes) { changes.push('notes'); d.notes = nt; }
  if (changes.length) addAudit('edit','Edited '+(tg||tag)+': '+changes.join(', '));
  saveState(); closeModal(); render(); toast('Device updated');
}
function showEditNotes(tag) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  showModal('<h2>Notes for '+esc(tag)+'</h2><textarea id="mNotes2" style="min-height:120px">'+esc(d.notes)+'</textarea><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doEditNotes(\''+tag+'\')">Save</button></div>');
}
function doEditNotes(tag) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  d.notes = document.getElementById('mNotes2').value.trim();
  addAudit('note','Note updated on '+tag);
  saveState(); closeModal(); render(); toast('Notes saved');
}
function showSetStatus(tag) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  var cur = deriveStatus(d).status;
  var opts = ['In Use','In Store','Broken'];
  var html = '<h2>Set Status for '+esc(tag)+'</h2><p style="margin-bottom:12px;color:var(--ink-2);font-size:13px">Current: '+pillHtml(cur)+'</p>';
  opts.forEach(function(o){
    var active = d.manualStatus === o;
    html += '<div class="card" onclick="doSetStatus(\''+tag+'\',\''+o+'\')" style="cursor:pointer;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px'+(active?';border-color:var(--o-500);background:var(--o-50)':'')+'">' + pillHtml(o) + '<span style="font-size:13px;color:var(--ink-2)">' +
      (o==='In Use'?'Device is actively assigned and being used':o==='In Store'?'Device is in storage, not currently assigned':'Device is broken or non-functional') + '</span></div>';
  });
  if (d.manualStatus) {
    html += '<div style="margin-top:8px;text-align:center"><button class="btn btn-secondary btn-sm" onclick="doSetStatus(\''+tag+'\',null)">Clear manual override (use auto-detect)</button></div>';
  }
  html += '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>';
  showModal(html);
}
function doSetStatus(tag, newStatus) {
  var d = state.devices.find(function(x){return x.tag===tag;});
  var prev = d.manualStatus || deriveStatus(d).status;
  if (newStatus === null) {
    d.manualStatus = null;
    addAudit('edit',tag+' status override cleared (was '+prev+')');
    toast('Status reset to auto-detect');
  } else {
    d.manualStatus = newStatus;
    addAudit('edit',tag+' status set to '+newStatus+' (was '+prev+')');
    toast('Status set to '+newStatus);
  }
  saveState(); closeModal(); render();
}
function showAddDevice() {
  var maxTag = Math.max.apply(null, state.devices.map(function(d){return parseInt(d.tag)||0;}));
  showModal('<h2>Add New Device</h2><label>Asset Tag</label><input id="mNewTag" value="'+(maxTag+1)+'"/><label>Serial Number</label><input id="mNewSerial" placeholder="e.g. 5CD3094Y7T"/><label>Make</label><input id="mNewMake" value="HP"/><label>Model</label><input id="mNewModel" placeholder="e.g. ProBook 440 G9"/><label>Site</label><input id="mNewSite" value="Main"/><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doAddDevice()">Create</button></div>');
}
function doAddDevice() {
  var tag = document.getElementById('mNewTag').value.trim();
  var serial = document.getElementById('mNewSerial').value.trim().toUpperCase();
  if (!tag || !serial) { toast('Tag and serial required','error'); return; }
  if (state.devices.find(function(d){return d.tag===tag;})) { toast('Tag already exists','error'); return; }
  state.devices.push({
    tag:tag, serial:serial, name:null, make:document.getElementById('mNewMake').value.trim(),
    model:document.getElementById('mNewModel').value.trim(), cpu:'', ram:0, totalGB:0, freeGB:0,
    os:'', osVersion:'', purchaseDate:new Date().toISOString().slice(0,10), warrantyEnd:'',
    ip:'', site:document.getElementById('mNewSite').value.trim(), compliance:'', encrypted:false,
    userId:null, notes:'', feeds:{}, manualStatus:null, retiredReason:null, retiredAt:null, historical:false
  });
  addAudit('tag','Asset '+tag+' created · '+serial);
  saveState(); closeModal(); render(); toast('Device created');
}

  var orphans = devs.filter(function(d){return d.feeds&&d.feeds.rmm && !(d.feeds&&d.feeds.intune);});

      '<button class="btn btn-primary" style="margin-top:16px" onclick="importState={step:1,files:{intune:null,rmm:null,cyber:null,tags:null},parsed:{},diff:null,summary:null};render()">Start New Sync</button></div>';
  }
}

function handleSyncFile(feed, file) {
  if (!file) return;
  importState.files[feed] = file;
  render();
}

function parseXlsxFile(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    if (file.name.endsWith('.csv')) {
      callback(parseCSVText(e.target.result));
    } else {
      var data = new Uint8Array(e.target.result);
      var wb = XLSX.read(data, {type:'array'});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      callback(rows);
    }
  };
  if (file.name.endsWith('.csv')) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

function parseExcelSerialDate(val) {
  if (!val) return '';
  if (typeof val === 'number') return new Date((val - 25569) * 86400 * 1000).toISOString();
  var s = String(val);
  if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s;
  return s;
}

function parseRMMDate(val) {
  if (!val) return '';
  var s = String(val);
  // handle Excel serial number
  if (typeof val === 'number') return new Date((val - 25569) * 86400 * 1000).toISOString();
  // format: "MM/dd/yyyy hh:mm tt" e.g. "05/21/2026 02:30 PM"
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (m) {
    var hr = parseInt(m[4]);
    if (m[6].toUpperCase() === 'PM' && hr !== 12) hr += 12;
    if (m[6].toUpperCase() === 'AM' && hr === 12) hr = 0;
    return new Date(parseInt(m[3]), parseInt(m[1])-1, parseInt(m[2]), hr, parseInt(m[5])).toISOString();
  }
  var d = new Date(s);
  return isNaN(d.getTime()) ? '' : d.toISOString();
}

function parseCyberDate(val) {
  if (!val) return '';
  if (typeof val === 'number') return new Date((val - 25569) * 86400 * 1000).toISOString();
  // format: "21 May 2026, 08:02 AM"
  var d = new Date(String(val));
  return isNaN(d.getTime()) ? '' : d.toISOString();
}

function processSyncFiles() {
  var feeds = ['intune','rmm','cyber','tags'];
  var hasAny = feeds.some(function(f){return importState.files[f];});
  if (!hasAny) { toast('Upload at least one file','error'); return; }

  var pending = 0;
  var parsed = {intune:null,rmm:null,cyber:null,tags:null};

  feeds.forEach(function(f){
    if (importState.files[f]) pending++;
  });

  feeds.forEach(function(f){
    if (!importState.files[f]) return;
    parseXlsxFile(importState.files[f], function(rows){
      parsed[f] = rows;
      pending--;
      if (pending === 0) {
        importState.parsed = parsed;
        importState.diff = computeSyncDiff(parsed);
        importState.step = 2;
        render();
      }
    });
  });
}

function computeSyncDiff(parsed) {
  var diff = {added:[], updated:[], userChanges:0, feedChanges:0, changeDetails:[]};
  // Build serial map and name map of existing devices
  var serialMap = {};
  var nameMap = {};
  state.devices.forEach(function(d){
    if(d.serial) serialMap[d.serial.toUpperCase()] = d;
    if(d.name) nameMap[d.name.toUpperCase()] = d;
  });
  // Build email→user map
  var emailMap = {};
  state.users.forEach(function(u){if(u.email) emailMap[u.email.toLowerCase()] = u;});

  // Merged records keyed by serial
  var merged = {};

  // Parse Intune rows
  if (parsed.intune) {
    parsed.intune.forEach(function(r){
      var serial = String(r['Serial number']||'').toUpperCase().trim();
      if(!serial || serial.startsWith('VMWARE')) return;
      if(!merged[serial]) merged[serial] = {serial:serial,source:'intune'};
      var m = merged[serial];
      m.intuneName = String(r['Device name']||'');
      m.intuneLastSeen = parseExcelSerialDate(r['Last check-in']);
      m.os = String(r['OS']||'');
      m.osVersion = String(r['OS version']||'');
      m.compliance = String(r['Compliance']||'');
      m.userEmail = String(r['Primary user email address']||'').toLowerCase().trim();
      m.userName = String(r['Primary user display name']||'');
      m.make = String(r['Manufacturer']||'');
      m.model = String(r['Model']||'');
      var totalMB = parseFloat(r['Total storage'])||0;
      var freeMB = parseFloat(r['Free storage'])||0;
      m.totalGB = totalMB > 0 ? Math.round(totalMB/1024*100)/100 : 0;
      m.freeGB = freeMB > 0 ? Math.round(freeMB/1024*100)/100 : 0;
      m.encrypted = String(r['Encrypted']||'').toLowerCase() === 'true' || r['Encrypted'] === true;
      m.purchaseDate = parseExcelSerialDate(r['Enrollment date']);
      m.ip = String(r['WiFiIPv4Address']||'');
      m.hasIntune = true;
    });
  }

  // Parse RMM rows
  if (parsed.rmm) {
    parsed.rmm.forEach(function(r){
      var deviceType = String(r['Device Type']||'').trim();
      if(deviceType === 'Server') return;
      var serial = String(r['Device Serial Number']||'').toUpperCase().trim();
      var hostname = String(r['Name']||'').toUpperCase().trim();
      if(!serial && !hostname) return;
      if(serial && serial.startsWith('VMWARE')) return;
      var key = serial || ('NAME:'+hostname);
      // Try to find in merged by serial, then by hostname
      var target = null;
      if(serial && merged[serial]) target = serial;
      else if(serial) target = serial;
      else {
        // find by hostname in merged
        var found = false;
        for(var k in merged){if(merged[k].intuneName && merged[k].intuneName.toUpperCase()===hostname){target=k;found=true;break;}}
        if(!found) target = key;
      }
      if(!merged[target]) merged[target] = {serial:serial||'',source:'rmm'};
      var m = merged[target];
      if(!m.serial && serial) m.serial = serial;
      m.rmmName = String(r['Name']||'');
      m.rmmLastSeen = parseRMMDate(r['Last Check Date']);
      if(!m.os) m.os = String(r['OS']||'');
      m.rmmIP = String(r['IP Address']||'');
      if(!m.model) m.model = String(r['System Model']||'');
      m.cpu = String(r['Processor']||'');
      m.ram = parseFloat(r['RAM (GB)'])||0;
      if(!m.totalGB) m.totalGB = parseFloat(r['Disk Volume (GB)'])||0;
      m.site = String(r['Site Friendly Name']||'');
      m.hasRMM = true;
    });
  }

  // Parse Cybersmart rows
  if (parsed.cyber) {
    parsed.cyber.forEach(function(r){
      var rawSerial = String(r['Serial & Device ID']||'').trim();
      var serial = rawSerial.split(' ')[0].toUpperCase();
      var hostname = String(r['Host Name']||'').toUpperCase().trim();
      if(!serial && !hostname) return;
      if(serial && serial.startsWith('VMWARE')) return;
      var target = null;
      if(serial && merged[serial]) target = serial;
      else if(serial) {
        // try hostname match
        var found = false;
        for(var k in merged){if((merged[k].intuneName && merged[k].intuneName.toUpperCase()===hostname)||(merged[k].rmmName && merged[k].rmmName.toUpperCase()===hostname)){target=k;found=true;break;}}
        if(!found) target = serial;
      } else {
        var found2 = false;
        for(var k2 in merged){if((merged[k2].intuneName && merged[k2].intuneName.toUpperCase()===hostname)||(merged[k2].rmmName && merged[k2].rmmName.toUpperCase()===hostname)){target=k2;found2=true;break;}}
        if(!found2) target = 'HOST:'+hostname;
      }
      if(!merged[target]) merged[target] = {serial:serial||'',source:'cyber'};
      var m = merged[target];
      if(!m.serial && serial) m.serial = serial;
      m.cyberName = String(r['Host Name']||'');
      m.cyberLastSeen = parseCyberDate(r['Last Checked In']);
      m.cyberUser = String(r['Last User']||'');
      if(!m.os) m.os = String(r['Operating System']||'');
      if(!m.osVersion) m.osVersion = String(r['OS Release']||'');
      m.hasCyber = true;
    });
  }

  // Parse Asset Tags
  if (parsed.tags) {
    parsed.tags.forEach(function(r){
      var serial = String(r['Serial Number']||'').toUpperCase().trim();
      var hostname = String(r['Device Name']||'').toUpperCase().trim();
      var assetTag = String(r['Asset Tag']||'').trim();
      if(!serial && !hostname) return;
      var target = null;
      if(serial && merged[serial]) target = serial;
      else if(serial) {
        var found = false;
        for(var k in merged){
          var mn = merged[k].intuneName||merged[k].rmmName||merged[k].cyberName||'';
          if(mn.toUpperCase()===hostname){target=k;found=true;break;}
        }
        if(!found) target = serial;
      } else {
        var found3 = false;
        for(var k3 in merged){
          var mn3 = merged[k3].intuneName||merged[k3].rmmName||merged[k3].cyberName||'';
          if(mn3.toUpperCase()===hostname){target=k3;found3=true;break;}
        }
        if(!found3) return;
      }
      if(merged[target]) {
        if(assetTag) merged[target].assetTag = assetTag;
      }
    });
  }

  // Now compare merged against existing state.devices
  var now = new Date().toISOString();
  for(var key in merged) {
    var m = merged[key];
    if(!m.serial) continue;
    var existing = serialMap[m.serial];
    // also try hostname match
    if(!existing){
      var mName = (m.intuneName||m.rmmName||m.cyberName||'').toUpperCase();
      if(mName && nameMap[mName]) existing = nameMap[mName];
    }
    if(!existing) {
      diff.added.push({serial:m.serial, name:m.intuneName||m.rmmName||m.cyberName||'', source:m.source});
    } else {
      var changes = [];
      var tag = existing.tag;
      // Check user reassignment
      if(m.userEmail){
        var oldUser = getUserById(existing.userId);
        var oldEmail = oldUser ? oldUser.email.toLowerCase() : '';
        if(m.userEmail !== oldEmail && m.userEmail){
          changes.push('user reassigned');
          diff.userChanges++;
          diff.changeDetails.push({tag:tag, type:'reassign', detail:'Reassigned from '+(oldUser?oldUser.name:'Unassigned')+' to '+m.userName});
        }
      }
      // Check storage changes
      if(m.totalGB && existing.totalGB && Math.abs(m.totalGB - existing.totalGB) > 1){
        changes.push('storage changed');
        diff.changeDetails.push({tag:tag, type:'storage', detail:'Total storage: '+Math.round(existing.totalGB)+'GB -> '+Math.round(m.totalGB)+'GB'});
      }
      if(m.freeGB && existing.freeGB && Math.abs(m.freeGB - existing.freeGB) > 1){
        changes.push('free space changed');
        diff.changeDetails.push({tag:tag, type:'storage', detail:'Free storage: '+Math.round(existing.freeGB)+'GB -> '+Math.round(m.freeGB)+'GB'});
      }
      // Check feed changes
      var oldFeeds = existing.feeds||{};
      if(m.hasIntune && !oldFeeds.intune){changes.push('intune added');diff.feedChanges++;diff.changeDetails.push({tag:tag,type:'feed',detail:'Intune feed added'});}
      if(m.hasRMM && !oldFeeds.rmm){changes.push('rmm added');diff.feedChanges++;diff.changeDetails.push({tag:tag,type:'feed',detail:'RMM feed added'});}
      if(m.hasCyber && !oldFeeds.cyber){changes.push('cyber added');diff.feedChanges++;diff.changeDetails.push({tag:tag,type:'feed',detail:'Cybersmart feed added'});}
      // Check compliance
      if(m.compliance && m.compliance !== existing.compliance && existing.compliance){
        changes.push('compliance changed');
        diff.changeDetails.push({tag:tag, type:'compliance', detail:'Compliance: '+existing.compliance+' -> '+m.compliance});
      }
      if(changes.length > 0){
        diff.updated.push({tag:tag, serial:m.serial, changes:changes});
      }
    }
    // Store merged data for apply phase
    m._existing = existing;
  }
  importState._merged = merged;
  return diff;
}

function applySyncImport() {
  // Save snapshot before applying
  var snapshots = [];
  try { snapshots = JSON.parse(localStorage.getItem('wv_snapshots')||'[]'); } catch(e){}
  var inUseCount = state.devices.filter(function(d){return deriveStatus(d).status==='In Use';}).length;
  snapshots.push({date:new Date().toISOString(), deviceCount:state.devices.length, inUse:inUseCount, summary:'Pre-sync snapshot: '+state.devices.length+' devices'});
  if(snapshots.length > 12) snapshots = snapshots.slice(snapshots.length - 12);
  localStorage.setItem('wv_snapshots', JSON.stringify(snapshots));

  var merged = importState._merged;
  var now = new Date().toISOString();
  var added=0, updated=0;
  var serialMap = {};
  var nameMap = {};
  state.devices.forEach(function(d){
    if(d.serial) serialMap[d.serial.toUpperCase()] = d;
    if(d.name) nameMap[d.name.toUpperCase()] = d;
  });
  var emailMap = {};
  state.users.forEach(function(u){if(u.email) emailMap[u.email.toLowerCase()] = u;});
  var maxT = Math.max.apply(null, state.devices.map(function(d){return parseInt(d.tag)||0;}));
  var nextT = maxT + 1;

  for(var key in merged) {
    var m = merged[key];
    if(!m.serial) continue;
    var d = serialMap[m.serial];
    if(!d){
      var mName = (m.intuneName||m.rmmName||m.cyberName||'').toUpperCase();
      if(mName && nameMap[mName]) d = nameMap[mName];
    }

    if(!d) {
      // New device
      var tag = m.assetTag || String(nextT++);
      d = normalizeDevice({
        tag:tag, serial:m.serial, name:m.intuneName||m.rmmName||m.cyberName||null,
        make:m.make||'Unknown', model:m.model||'Unknown', cpu:m.cpu||'', ram:m.ram||0,
        totalGB:m.totalGB||0, freeGB:m.freeGB||0, os:m.os||'', osVersion:m.osVersion||'',
        purchaseDate:m.purchaseDate||'', ip:m.ip||m.rmmIP||'', site:m.site||'Main',
        compliance:m.compliance||'', encrypted:m.encrypted||false,
        feeds:{}, history:[]
      });
      if(m.hasIntune) d.feeds.intune = {lastSeen:m.intuneLastSeen||now};
      if(m.hasRMM) d.feeds.rmm = {lastSeen:m.rmmLastSeen||now};
      if(m.hasCyber) d.feeds.cyber = {lastSeen:m.cyberLastSeen||now};
      // Assign user if email found
      if(m.userEmail && emailMap[m.userEmail]){
        d.userId = emailMap[m.userEmail].id;
      } else if(m.userEmail && m.userName){
        var newUser = normalizeUser({id:'u'+Date.now()+'_'+Math.random().toString(36).slice(2,6), name:m.userName, email:m.userEmail, team:''});
        state.users.push(newUser);
        emailMap[m.userEmail] = newUser;
        d.userId = newUser.id;
      }
      state.devices.push(d);
      serialMap[m.serial] = d;
      added++;
    } else {
      // Update existing device
      if(!d.history) d.history = [];
      // User reassignment
      if(m.userEmail){
        var oldUser = getUserById(d.userId);
        var oldEmail = oldUser ? oldUser.email.toLowerCase() : '';
        if(m.userEmail !== oldEmail){
          var newU = emailMap[m.userEmail];
          if(!newU && m.userName){
            newU = normalizeUser({id:'u'+Date.now()+'_'+Math.random().toString(36).slice(2,6), name:m.userName, email:m.userEmail, team:''});
            state.users.push(newU);
            emailMap[m.userEmail] = newU;
          }
          if(newU){
            d.history.push({ts:now, type:'reassign', detail:'Reassigned from '+(oldUser?oldUser.name:'Unassigned')+' to '+newU.name});
            d.userId = newU.id;
          }
        }
      }
      // Storage changes
      if(m.totalGB && Math.abs(m.totalGB - (d.totalGB||0)) > 1){
        d.history.push({ts:now, type:'storage', detail:'Total storage changed from '+Math.round(d.totalGB||0)+'GB to '+Math.round(m.totalGB)+'GB'});
        d.totalGB = m.totalGB;
      }
      if(m.freeGB && Math.abs(m.freeGB - (d.freeGB||0)) > 1){
        d.history.push({ts:now, type:'storage', detail:'Free storage changed from '+Math.round(d.freeGB||0)+'GB to '+Math.round(m.freeGB)+'GB'});
        d.freeGB = m.freeGB;
      }
      // Feed changes
      if(!d.feeds) d.feeds = {};
      if(m.hasIntune && !d.feeds.intune){d.history.push({ts:now,type:'feed',detail:'Intune feed added'});}
      if(m.hasRMM && !d.feeds.rmm){d.history.push({ts:now,type:'feed',detail:'RMM feed added'});}
      if(m.hasCyber && !d.feeds.cyber){d.history.push({ts:now,type:'feed',detail:'Cybersmart feed added'});}
      if(m.hasIntune) d.feeds.intune = {lastSeen:m.intuneLastSeen||now};
      if(m.hasRMM) d.feeds.rmm = {lastSeen:m.rmmLastSeen||now};
      if(m.hasCyber) d.feeds.cyber = {lastSeen:m.cyberLastSeen||now};
      // Compliance change
      if(m.compliance && m.compliance !== d.compliance && d.compliance){
        d.history.push({ts:now, type:'compliance', detail:'Compliance changed from '+d.compliance+' to '+m.compliance});
      }
      if(m.compliance) d.compliance = m.compliance;
      // Update other fields
      if(m.os) d.os = m.os;
      if(m.osVersion) d.osVersion = m.osVersion;
      if(m.make && m.make !== 'Unknown') d.make = m.make;
      if(m.model && m.model !== 'Unknown') d.model = m.model;
      if(m.cpu) d.cpu = m.cpu;
      if(m.ram) d.ram = m.ram;
      if(m.ip) d.ip = m.ip;
      if(m.rmmIP && !d.ip) d.ip = m.rmmIP;
      if(m.site) d.site = m.site;
      if(m.encrypted) d.encrypted = m.encrypted;
      if(m.purchaseDate && !d.purchaseDate) d.purchaseDate = m.purchaseDate;
      if(m.intuneName) d.name = m.intuneName;
      else if(m.rmmName && !d.name) d.name = m.rmmName;
      if(m.assetTag && d.tag !== m.assetTag){d.tag = m.assetTag;}
      updated++;
    }
  }

  // Update feed meta
  if(!state.feedMeta) state.feedMeta = {};
  var datestamp = new Date().toISOString().slice(0,10);
  if(importState.parsed.intune) state.feedMeta.intune = {lastImport:datestamp, count:importState.parsed.intune.length};
  if(importState.parsed.rmm) state.feedMeta.rmm = {lastImport:datestamp, count:importState.parsed.rmm.length};
  if(importState.parsed.cyber) state.feedMeta.cyber = {lastImport:datestamp, count:importState.parsed.cyber.length};

  addAudit('sync','Monthly sync: '+added+' added, '+updated+' updated');
  saveState();
  importState.summary = added+' new devices added, '+updated+' devices updated';
  importState.step = 4;
  render();
  toast('Monthly sync complete: '+added+' added, '+updated+' updated');
}

function parseCSVText(text) {
  var lines = text.split(/\r?\n/).filter(function(l){return l.trim();});
  if (!lines.length) return [];
  var headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(function(line) {
    var vals = parseCSVLine(line);
    var obj = {};
    headers.forEach(function(h,i){obj[h.trim()]=(vals[i]||'').trim();});
    return obj;
  });
}

function parseCSVLine(line) {
  var result=[],current='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){current+='"';i++;}else if(c==='"')inQ=false;else current+=c;}
    else{if(c==='"')inQ=true;else if(c===','){result.push(current);current='';}else current+=c;}
  }
  result.push(current);return result;
}

function computeDiff(feed, rows) {
  var diff = {added:[],updated:[],unchanged:0};
  var sm = {};
  state.devices.forEach(function(d){sm[d.serial.toUpperCase()]=d;});
  rows.forEach(function(r) {
    var serial='';
    if(feed==='intune') serial=(r['Serial number']||'').toUpperCase();
    else if(feed==='rmm') serial=(r['Device Serial Number']||'').toUpperCase();
    else if(feed==='cyber') serial=((r['Serial & Device ID']||'').split(' ')[0]||'').toUpperCase();
    else if(feed==='tags') serial=(r['Serial Number']||'').toUpperCase();
    if(!serial||serial.startsWith('VMWARE'))return;
    if(!sm[serial]) diff.added.push({serial:serial,name:r['Device name']||r['Name']||r['Host Name']||''});
    else { diff.updated.push({tag:sm[serial].tag,serial:serial}); }
  });
  return diff;
}

function applyImport() {
  var feed = importState.feed, rows = importState.parsed;
  var added=0, updated=0;
  var sm = {};
  state.devices.forEach(function(d){sm[d.serial.toUpperCase()]=d;});
  var maxT = Math.max.apply(null, state.devices.map(function(d){return parseInt(d.tag)||0;}));
  var nextT = maxT + 1;
  rows.forEach(function(r) {
    var serial='';
    if(feed==='intune') serial=(r['Serial number']||'').toUpperCase();
    else if(feed==='rmm') serial=(r['Device Serial Number']||'').toUpperCase();
    else if(feed==='cyber') serial=((r['Serial & Device ID']||'').split(' ')[0]||'').toUpperCase();
    else if(feed==='tags') serial=(r['Serial Number']||'').toUpperCase();
    if(!serial||serial.startsWith('VMWARE'))return;
    var d = sm[serial];
    if (!d) {
      d = {tag:String(nextT++),serial:serial,name:null,make:'Unknown',model:'Unknown',cpu:'',ram:0,totalGB:0,freeGB:0,os:'',osVersion:'',purchaseDate:'',warrantyEnd:'',ip:'',site:'Main',compliance:'',encrypted:false,userId:null,notes:'',feeds:{},manualStatus:null,retiredReason:null,retiredAt:null,historical:false};
      state.devices.push(d); sm[serial]=d; added++;
    } else { updated++; }
    if(feed==='intune'){var ls=(r['Last check-in']||'').slice(0,19).replace(' ','T');if(ls&&!ls.startsWith('0001'))d.feeds.intune={lastSeen:ls};}
    else if(feed==='rmm'){d.feeds.rmm={lastSeen:new Date().toISOString()};}
    else if(feed==='cyber'){d.feeds.cyber={lastSeen:new Date().toISOString()};}
  });
  if(!state.feedMeta)state.feedMeta={};
  state.feedMeta[feed]={lastImport:new Date().toISOString().slice(0,10),count:rows.length};
  addAudit('sync',feed+' import: '+added+' added, '+updated+' updated, '+rows.length+' total');
  saveState(); importState.step = 3; render(); toast('Import complete: '+added+' added, '+updated+' updated');
}

// === AUDIT LOG ===
function renderAudit(app) {
  var kinds = ['all','retire','assign','transfer','note','sync','tag','edit'];
  if (!window._auditFilter) window._auditFilter = 'all';
  if (!window._auditSearch) window._auditSearch = '';
  var entries = state.audit;
  if (window._auditFilter !== 'all') entries = entries.filter(function(a){return a.kind===window._auditFilter;});
  if (window._auditSearch) { var q=window._auditSearch.toLowerCase(); entries=entries.filter(function(a){return (a.msg||'').toLowerCase().includes(q);});}
  app.innerHTML =
    '<h1 class="page-title">Audit Log</h1>'+
    '<div class="chip-bar">'+kinds.map(function(k){return '<span class="chip '+(window._auditFilter===k?'active':'')+'" onclick="window._auditFilter=\''+k+'\';render()">'+k+'</span>';}).join('')+'</div>'+
    '<div class="toolbar"><input class="search-input" placeholder="Search audit log..." value="'+esc(window._auditSearch)+'" oninput="window._auditSearch=this.value;render()"/></div>'+
    (entries.length===0?'<div class="empty-state"><h3>No audit entries</h3><p>Actions will appear here.</p></div>':
    '<table class="data-table"><thead><tr><th>Timestamp</th><th>Kind</th><th>Message</th><th>Actor</th></tr></thead><tbody>'+
    entries.slice(0,100).map(function(a){return '<tr><td class="mono" style="font-size:12px;white-space:nowrap">'+new Date(a.ts).toLocaleString('en-GB')+'</td><td><span class="audit-kind '+a.kind+'">'+a.kind+'</span></td><td>'+esc(a.msg)+'</td><td>'+esc(a.actor)+'</td></tr>';}).join('')+'</tbody></table>');
}

// === SETTINGS ===
function renderSettings(app) {
  var storageUsed = 0;
  try { storageUsed = Math.round((new Blob([localStorage.getItem(LS_KEY)||'']).size)/1024); } catch(e){}
  app.innerHTML =
    '<h1 class="page-title">Settings</h1>'+
    '<div class="settings-section card"><h3>Storage</h3><p style="font-size:13px;color:var(--ink-2);margin-bottom:8px">localStorage usage: <strong>'+storageUsed+' KB</strong> / ~5,000 KB</p><div class="storage-bar" style="width:200px"><span class="fill '+(storageUsed>4000?'red':storageUsed>2500?'yellow':'green')+'" style="width:'+Math.min(100,storageUsed/50)+'%"></span></div></div>'+
    '<div class="settings-section card"><h3>Backup & Restore</h3><div style="display:flex;gap:12px;margin-top:12px"><button class="btn btn-secondary" onclick="exportJSON()">Export JSON Backup</button><button class="btn btn-secondary" onclick="document.getElementById(\'restoreInput\').click()">Import JSON Restore</button><input type="file" id="restoreInput" accept=".json" style="display:none" onchange="importJSON(this.files[0])"/></div></div>'+
    '<div class="settings-section card"><h3>Reset</h3><p style="font-size:13px;color:var(--ink-3);margin-bottom:12px">Reset all data to sample data.</p><button class="btn btn-danger" onclick="if(confirm(\'Reset all data?\')){localStorage.removeItem(LS_KEY);state=loadState();saveState();render();toast(\'Reset to sample data\')}">Reset to Sample Data</button></div>';
}
function exportJSON() {
  var blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wv_asset_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); toast('Backup exported');
}
function importJSON(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data.devices && data.users) { state = data; saveState(); render(); toast('Data restored'); }
      else toast('Invalid backup','error');
    } catch(e) { toast('Parse error','error'); }
  };
  reader.readAsText(file);
}

// === GLOBAL SEARCH ===
function syncGlobalSearch() {
  var g = document.getElementById('globalSearch');
  if (g && g.value !== deviceSearch) g.value = deviceSearch;
}
document.getElementById('globalSearch').addEventListener('input', function() {
  var q = this.value;
  deviceSearch = q;
  deviceFilter = 'all';
  // Only navigate if we're not already on the devices page
  if (location.hash.indexOf('#/devices') !== 0) {
    navigate('#/devices');
  } else {
    render();
  }
});
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('globalSearch').focus(); }
});

// === INIT ===
render();
</script>
</body>
</html>
